name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Check formatting
        run: npm run format:check

      - name: Run linters
        run: npm run lint

      - name: Type-check stable runtime scope
        run: npm run typecheck:quality

      - name: Build application
        run: npm run build
